<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1b2a5e"/>
      <stop offset="100%" stop-color="#0a1030"/>
    </radialGradient>
    <radialGradient id="moon" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#e8e6df"/>
      <stop offset="100%" stop-color="#9a988f"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.7">
    <circle cx="90" cy="80" r="1.6"/><circle cx="200" cy="40" r="1.2"/><circle cx="330" cy="110" r="1.4"/>
    <circle cx="520" cy="60" r="1.2"/><circle cx="700" cy="90" r="1.7"/><circle cx="760" cy="200" r="1.2"/>
    <circle cx="60" cy="300" r="1.3"/><circle cx="130" cy="480" r="1.5"/><circle cx="640" cy="520" r="1.3"/>
    <circle cx="740" cy="420" r="1.2"/><circle cx="420" cy="30" r="1.1"/><circle cx="280" cy="560" r="1.4"/>
  </g>
  <!-- Moon -->
  <circle cx="400" cy="300" r="110" fill="url(#moon)"/>
  <g fill="#8b897f" opacity="0.55">
    <circle cx="360" cy="260" r="18"/><circle cx="440" cy="330" r="24"/><circle cx="410" cy="240" r="10"/>
    <circle cx="350" cy="340" r="13"/><circle cx="460" cy="270" r="8"/>
  </g>
  <!-- Orbits -->
  <ellipse cx="400" cy="300" rx="300" ry="150" fill="none" stroke="#7aa2f7" stroke-width="2" opacity="0.85"/>
  <ellipse cx="400" cy="300" rx="240" ry="200" fill="none" stroke="#c0caf5" stroke-width="1.5" stroke-dasharray="7 7" opacity="0.6" transform="rotate(-30 400 300)"/>
  <!-- Spacecraft -->
  <g transform="translate(683,240)">
    <rect x="-9" y="-6" width="18" height="12" rx="2" fill="#e0e6ff"/>
    <rect x="-27" y="-4" width="14" height="8" fill="#3d59a1"/>
    <rect x="13" y="-4" width="14" height="8" fill="#3d59a1"/>
  </g>
  <!-- Debris cloud crossing the orbit -->
  <g fill="#f7768e">
    <circle cx="180" cy="210" r="4"/><circle cx="205" cy="195" r="3"/><circle cx="225" cy="225" r="3.5"/>
    <circle cx="160" cy="235" r="3"/><circle cx="245" cy="205" r="2.5"/><circle cx="195" cy="245" r="2.5"/>
  </g>
  <!-- Avoidance maneuver arrow -->
  <path d="M 683 240 q 40 -55 105 -70" fill="none" stroke="#9ece6a" stroke-width="4" stroke-linecap="round"/>
  <path d="M 775 163 l 18 3 -10 15 z" fill="#9ece6a"/>
  <text x="400" y="560" text-anchor="middle" fill="#c0caf5" font-size="26">Lunar Debris — Collision Probability &amp; Avoidance</text>
</svg>
