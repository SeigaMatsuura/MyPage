<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1b2a5e"/>
      <stop offset="100%" stop-color="#0a1030"/>
    </radialGradient>
    <radialGradient id="earth" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#5c86d6"/>
      <stop offset="100%" stop-color="#20406e"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <g fill="#ffffff" opacity="0.7">
    <circle cx="120" cy="90" r="1.5"/><circle cx="260" cy="50" r="1.2"/><circle cx="600" cy="70" r="1.5"/>
    <circle cx="720" cy="160" r="1.2"/><circle cx="70" cy="420" r="1.3"/><circle cx="700" cy="500" r="1.4"/>
  </g>
  <!-- Earth -->
  <circle cx="400" cy="320" r="140" fill="url(#earth)"/>
  <g fill="#9ece6a" opacity="0.7">
    <path d="M 340 250 q 30 -18 60 -6 q 18 8 8 26 q -22 20 -50 12 q -28 -10 -18 -32 z"/>
    <path d="M 440 350 q 26 -10 44 6 q 12 14 -4 26 q -24 12 -42 -2 q -12 -16 2 -30 z"/>
  </g>
  <!-- Rocket body orbit -->
  <ellipse cx="400" cy="320" rx="320" ry="120" fill="none" stroke="#7aa2f7" stroke-width="2" opacity="0.9" transform="rotate(-15 400 320)"/>
  <!-- Observed vs propagated track -->
  <ellipse cx="400" cy="320" rx="320" ry="120" fill="none" stroke="#e0af68" stroke-width="1.5" stroke-dasharray="6 8" opacity="0.8" transform="rotate(-9 400 320)"/>
  <!-- Rocket upper stage -->
  <g transform="translate(690,220) rotate(30)">
    <rect x="-8" y="-24" width="16" height="42" rx="6" fill="#d5dcf5"/>
    <path d="M -8 18 l 8 12 l 8 -12 z" fill="#f7768e"/>
  </g>
  <!-- TLE text motif -->
  <g fill="#787fa5" font-family="monospace" font-size="15">
    <text x="60" y="80">1 25544U 98067A   26059.54791667 ...</text>
    <text x="60" y="102">2 25544  51.6400 208.9163 0006317 ...</text>
  </g>
  <text x="400" y="560" text-anchor="middle" fill="#c0caf5" font-size="26">SGP4 / TLE — Orbit Tracking of Upper Stages</text>
</svg>
